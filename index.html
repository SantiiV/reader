<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libros • Apple Books</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Georgia&display=swap');
        
        :root { --bg: #0f0f0f; --text: #f0f0f0; }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a1a;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .logo { font-size: 24px; font-weight: 700; }
        
        .nav a {
            color: #aaa;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 9999px;
        }
        .nav a.active { background: #333; color: white; }
        
        .main { flex: 1; display: flex; overflow: hidden; }
        
        /* Biblioteca */
        #library-view {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        #library {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 32px;
        }
        .book-card {
            cursor: pointer;
            transition: all 0.3s;
        }
        .book-card:hover { transform: translateY(-10px); }
        .book-cover {
            width: 100%;
            aspect-ratio: 5/7;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        .book-cover img { width:100%; height:100%; object-fit:cover; }
        
        /* Lector PDF */
        #reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: #0a0a0a;
        }
        #pdf-container {
            flex: 1;
            overflow: auto;
            padding: 40px;
            text-align: center;
            background: #111;
        }
        #pdf-pages {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .pdf-page {
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: white;
        }
        
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 64px;
            height: 64px;
            background: #222;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Libros</div>
        <div class="nav">
            <a href="#" onclick="switchView('library')" class="active" id="lib-tab">Biblioteca</a>
            <a href="#" onclick="switchView('reader')" id="read-tab">Leyendo</a>
        </div>
    </header>
    
    <div class="main">
        <!-- Biblioteca -->
        <div id="library-view">
            <div style="text-align:center; margin-bottom:30px;">
                <input type="file" id="pdf-upload" accept="application/pdf" style="display:none;">
                <button onclick="document.getElementById('pdf-upload').click()" 
                        style="padding:12px 28px; background:#333; border:none; border-radius:9999px; color:white; cursor:pointer;">
                    + Agregar PDF
                </button>
            </div>
            <div id="library"></div>
        </div>
        
        <!-- Lector -->
        <div id="reader-view">
            <div style="padding:15px 30px; background:#1a1a1a; display:flex; justify-content:space-between; align-items:center;">
                <button onclick="exitReader()" style="font-size:24px;">←</button>
                <div id="current-book-title" style="font-weight:600;"></div>
                <button onclick="toggleMenu()" style="font-size:24px;">Aa</button>
            </div>
            
            <div id="pdf-container">
                <div id="pdf-pages"></div>
            </div>
        </div>
    </div>
    
    <div class="fab" onclick="document.getElementById('pdf-upload').click()">+</div>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let library = JSON.parse(localStorage.getItem('pdfLibrary')) || [];
        
        function renderLibrary() {
            const container = document.getElementById('library');
            container.innerHTML = '';
            
            library.forEach((book, index) => {
                const div = document.createElement('div');
                div.className = 'book-card';
                div.innerHTML = `
                    <div class="book-cover">
                        <img src="${book.cover || 'https://picsum.photos/id/201/400/520'}" alt="${book.name}">
                    </div>
                    <div style="text-align:center; margin-top:12px;">
                        <div style="font-weight:600;">${book.name}</div>
                    </div>
                `;
                div.onclick = () => openPDF(book, index);
                container.appendChild(div);
            });
        }
        
        async function openPDF(book, index) {
            document.getElementById('current-book-title').textContent = book.name;
            switchView('reader');
            
            const pagesContainer = document.getElementById('pdf-pages');
            pagesContainer.innerHTML = '<p style="color:#888; padding:40px;">Cargando PDF...</p>';
            
            try {
                const loadingTask = pdfjsLib.getDocument(book.data);
                const pdf = await loadingTask.promise;
                
                pagesContainer.innerHTML = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const scale = 1.8;
                    const viewport = page.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page';
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    }).promise;
                    
                    pagesContainer.appendChild(canvas);
                }
            } catch (e) {
                pagesContainer.innerHTML = `<p style="color:red;">Error al cargar el PDF: ${e.message}</p>`;
            }
        }
        
        function switchView(view) {
            document.getElementById('library-view').style.display = view === 'library' ? 'block' : 'none';
            document.getElementById('reader-view').style.display = view === 'reader' ? 'flex' : 'none';
        }
        
        function exitReader() {
            switchView('library');
        }
        
        function toggleMenu() {
            alert("Ajustes de apariencia (próximamente)\n\nPuedes usar Ctrl + rueda del mouse para hacer zoom en las páginas.");
        }
        
        // Cargar PDF
        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                const newBook = {
                    name: file.name,
                    data: ev.target.result,
                    cover: 'https://picsum.photos/id/201/400/520'
                };
                
                library.unshift(newBook);
                localStorage.setItem('pdfLibrary', JSON.stringify(library));
                renderLibrary();
                
                // Abrir automáticamente
                openPDF(newBook, 0);
            };
            reader.readAsDataURL(file);
        });
        
        // Inicializar
        window.onload = () => {
            renderLibrary();
            switchView('library');
        };
    </script>
</body>
</html>
