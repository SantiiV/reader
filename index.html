<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Libros</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>
<style>
  :root{
    --bg: #0b0b0d;
    --bg-elevated: #17171a;
    --bg-card: #1c1c1f;
    --text: #e9e6dd;
    --text-dim: #8c8b8a;
    --accent: #d9a441;
    --hairline: #262629;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--serif);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  button { font-family: var(--sans); }

  #library { height: 100%; display: none; flex-direction: column; }
  #library.active { display: flex; }

  #libHeader {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(18px, env(safe-area-inset-top)) 24px 14px 24px;
    font-family: var(--sans);
  }
  #libHeader h1 { font-size: 22px; font-weight: 700; margin: 0; font-family: var(--serif); }
  #addBtn {
    background: var(--bg-elevated); border: 1px solid var(--hairline); color: var(--text);
    border-radius: 9999px; padding: 8px 16px; font-size: 13px; cursor: pointer;
  }
  #fileInput { display: none; }

  #libBody { flex: 1 1 auto; overflow-y: auto; padding: 6px 24px 40px 24px; }
  #emptyState {
    color: var(--text-dim); font-family: var(--sans); font-size: 13px;
    text-align: center; margin-top: 60px; line-height: 1.6;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 26px 18px;
  }
  .card { cursor: pointer; position: relative; }
  .cover-wrap {
    position: relative; width: 100%; aspect-ratio: 5/7;
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 14px 26px rgba(0,0,0,0.55);
    background: var(--bg-card);
  }
  .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display:block; }
  .card-title {
    font-family: var(--sans); font-size: 12.5px; color: var(--text);
    margin-top: 8px; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-pct { font-family: var(--sans); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .mini-progress {
    position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
    background: rgba(255,255,255,0.15);
  }
  .mini-progress-fill { height: 100%; background: var(--accent); }
  .del-btn {
    position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
    border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; opacity: 0; transition: opacity .15s;
  }
  .card:hover .del-btn, .card:active .del-btn { opacity: 1; }

  #reader { display: none; height: 100%; flex-direction: column; }
  #reader.active { display: flex; }

  #topbar {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: max(14px, env(safe-area-inset-top)) 18px 10px 18px;
    font-family: var(--sans);
  }
  #topbar button {
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; padding: 6px 8px; cursor: pointer; line-height: 1;
  }
  #topbar button:active { color: var(--text); }
  #bookTitle {
    color: var(--text-dim); font-size: 12px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase;
    max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  #viewerWrap { flex: 1 1 auto; position: relative; min-height: 0; background: var(--bg); }
  #viewer { width: 100%; height: 100%; display: none; }

  /* raster (canvas) pdf view — fallback for scanned/no-text PDFs */
  #pdfContainer {
    width: 100%; height: 100%; overflow: hidden;
    display: none; align-items: center; justify-content: center;
  }
  #pdfContainer.scrollmode { overflow-y: auto; display: block; padding: 24px 0 60px 0; }
  #pdfPages { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .pdf-page-wrapper { position: relative; background: #fff; }
  .pdf-page-wrapper canvas { display: block; width: 100%; height: 100%; }
  #pdfContainer.night .pdf-page-wrapper { filter: invert(0.92) hue-rotate(180deg); }
  #pdfContainer.sepia .pdf-page-wrapper { filter: sepia(0.35) brightness(0.97); }

  /* text-reflow pdf view — real vector text, always crisp */
  #pdfTextWrap {
    width: 100%; height: 100%;
    display: none;
    overflow: hidden;
  }
  #pdfTextContainer {
    margin: 0 auto;
    color: var(--text);
    font-family: var(--serif);
    line-height: 1.65;
  }
  #pdfTextContainer p { margin: 0 0 0.9em 0; text-indent: 1.3em; }
  #pdfTextContainer p:first-child { text-indent: 0; }

  .tapzone { position: absolute; top: 0; bottom: 0; width: 26%; z-index: 5; }
  #tapPrev { left: 0; } #tapNext { right: 0; }
  .tapzone.hidden { display: none; }

  #bottombar {
    flex: 0 0 auto;
    padding: 8px 24px max(16px, env(safe-area-inset-bottom)) 24px;
    font-family: var(--sans);
  }
  #pageLabel { text-align: center; color: var(--text-dim); font-size: 12px; margin-bottom: 10px; }
  #progressTrack {
    height: 3px; background: var(--hairline); border-radius: 3px; position: relative; cursor: pointer;
  }
  #progressFill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; background: var(--text-dim); border-radius: 3px; }

  #settingsPanel { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; }
  #settingsPanel.active { display: flex; }
  #settingsCard {
    width: 100%; background: var(--bg-elevated); border-radius: 18px 18px 0 0;
    padding: 20px 22px max(24px, env(safe-area-inset-bottom)) 22px;
    font-family: var(--sans); border-top: 1px solid var(--hairline);
  }
  .settingsRow { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--hairline); }
  .settingsRow:last-child { border-bottom: none; }
  .settingsRow label { font-size: 14px; color: var(--text); }
  .stepper { display: flex; align-items: center; gap: 14px; }
  .stepper button { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--hairline); background: transparent; color: var(--text); font-size: 16px; cursor: pointer; }
  .theme-swatches { display: flex; gap: 10px; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .swatch.active { border-color: var(--accent); }
  .switch { position: relative; width: 44px; height: 26px; border-radius: 13px; background: var(--hairline); cursor: pointer; }
  .switch.on { background: var(--accent); }
  .switch .knob { position: absolute; top: 2px; left: 2px; width: 22px; height: 22px; border-radius: 50%; background: #fff; transition: left .15s; }
  .switch.on .knob { left: 20px; }
  #closeSettings, #deleteCurrentBtn { display: block; width: 100%; text-align: center; margin: 6px auto 0 auto; background: none; border: none; color: var(--text-dim); font-size: 13px; padding: 10px; cursor: pointer; }
  #deleteCurrentBtn { color: #d97878; margin-top: 4px; }

  #loadingMsg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-family: var(--sans); font-size: 13px; z-index: 4; }
</style>
</head>
<body>

<div id="library" class="active">
  <div id="libHeader">
    <h1>Libros</h1>
    <button id="addBtn">+ Agregar</button>
  </div>
  <input type="file" id="fileInput" accept=".epub,.pdf" />
  <div id="libBody">
    <div id="emptyState">Todavía no agregaste ningún libro.<br/>Tocá "+ Agregar" y elegí un .epub o .pdf desde tu compu.<br/>Todo se guarda en tu navegador, nada se sube a ningún servidor.</div>
    <div id="grid"></div>
  </div>
</div>

<div id="reader">
  <div id="topbar">
    <button id="btnLibrary" title="Volver">&#8249;</button>
    <div id="bookTitle">&nbsp;</div>
    <button id="btnSettings" title="Ajustes">Aa</button>
  </div>

  <div id="viewerWrap">
    <div id="viewer"></div>
    <div id="pdfContainer" class="night"><div id="pdfPages"></div></div>
    <div id="pdfTextWrap"><div id="pdfTextContainer"></div></div>
    <div id="loadingMsg">Abriendo libro…</div>
    <div class="tapzone" id="tapPrev"></div>
    <div class="tapzone" id="tapNext"></div>
  </div>

  <div id="bottombar">
    <div id="pageLabel">&nbsp;</div>
    <div id="progressTrack"><div id="progressFill"></div></div>
  </div>
</div>

<div id="settingsPanel">
  <div id="settingsCard">
    <div class="settingsRow">
      <label id="sizeLabel">Tamaño</label>
      <div class="stepper">
        <button id="sizeDown">−</button>
        <span id="sizeValueLabel" style="font-size:13px; color:var(--text-dim); min-width:34px; text-align:center;">100%</span>
        <button id="sizeUp">+</button>
      </div>
    </div>
    <div class="settingsRow">
      <label>Tema</label>
      <div class="theme-swatches">
        <div class="swatch active" data-theme="night" style="background:#0b0b0d; border-color:#d9a441;"></div>
        <div class="swatch" data-theme="sepia" style="background:#f1e7d0;"></div>
        <div class="swatch" data-theme="light" style="background:#ffffff;"></div>
      </div>
    </div>
    <div class="settingsRow">
      <label>Scroll continuo</label>
      <div class="switch" id="scrollSwitch"><div class="knob"></div></div>
    </div>
    <button id="closeSettings">Cerrar</button>
    <button id="deleteCurrentBtn">Eliminar este libro</button>
  </div>
</div>

<script>
(function(){

  /* ---------- Storage: IndexedDB with in-memory fallback ---------- */
  const DB_NAME = 'readerDB_v1', DB_VERSION = 2;
  let idb = null, idbAvailable = true;
  const memMeta = new Map(), memFiles = new Map(), memText = new Map();

  function openDB(){
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) { reject(new Error('no idb')); return; }
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('files')) db.createObjectStore('files', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('textcache')) db.createObjectStore('textcache', { keyPath: 'id' });
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function initStorage(){
    try { idb = await openDB(); } catch(e) { idbAvailable = false; console.warn('[reader] IndexedDB no disponible, usando memoria de sesión', e); }
  }
  function tx(store, mode){ return idb.transaction(store, mode).objectStore(store); }

  async function saveMeta(item){
    if (idbAvailable) return new Promise((res, rej) => {
      const r = tx('meta','readwrite').put(item);
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
    memMeta.set(item.id, item);
  }
  async function getAllMeta(){
    if (idbAvailable) return new Promise((res, rej) => {
      const r = tx('meta','readonly').getAll();
      r.onsuccess = () => res(r.result || []); r.onerror = () => rej(r.error);
    });
    return Array.from(memMeta.values());
  }
  async function saveFile(id, blob){
    if (idbAvailable) return new Promise((res, rej) => {
      const r = tx('files','readwrite').put({ id, blob });
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
    memFiles.set(id, blob);
  }
  async function getFile(id){
    if (idbAvailable) return new Promise((res, rej) => {
      const r = tx('files','readonly').get(id);
      r.onsuccess = () => res(r.result ? r.result.blob : null); r.onerror = () => rej(r.error);
    });
    return memFiles.get(id) || null;
  }
  async function removeBook(id){
    if (idbAvailable) { tx('meta','readwrite').delete(id); tx('files','readwrite').delete(id); tx('textcache','readwrite').delete(id); return; }
    memMeta.delete(id); memFiles.delete(id); memText.delete(id);
  }
  const TEXT_CACHE_VERSION = 2; // bump when extractPdfParagraphs logic changes, to invalidate stale cached text
  async function saveTextCache(id, paragraphs){
    const entry = { id, paragraphs, v: TEXT_CACHE_VERSION };
    if (idbAvailable) return new Promise((res, rej) => {
      const r = tx('textcache','readwrite').put(entry);
      r.onsuccess = () => res(); r.onerror = () => rej(r.error);
    });
    memText.set(id, entry);
  }
  async function getTextCache(id){
    let entry;
    if (idbAvailable) {
      entry = await new Promise((res, rej) => {
        const r = tx('textcache','readonly').get(id);
        r.onsuccess = () => res(r.result || null); r.onerror = () => rej(r.error);
      });
    } else {
      entry = memText.get(id) || null;
    }
    if (!entry || entry.v !== TEXT_CACHE_VERSION) return null;
    return entry.paragraphs;
  }

  const prefs = { theme: 'night', size: 100, scrollMode: false };
  function loadPrefs(){
    try { const raw = localStorage.getItem('reader_prefs'); if (raw) Object.assign(prefs, JSON.parse(raw)); }
    catch(e){ /* defaults */ }
  }
  function savePrefs(){
    try { localStorage.setItem('reader_prefs', JSON.stringify(prefs)); } catch(e){ /* memory only */ }
  }

  /* ---------- Helpers ---------- */
  const el = id => document.getElementById(id);
  const uid = () => 'b_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8);

  function blobToDataUrl(blob){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(blob);
    });
  }
  function arrayBufferToBlob(buf, type){ return new Blob([buf], { type }); }

  function placeholderCover(title){
    const colors = ['#8a6a2f','#3f5d63','#6b4f8a','#7a4b3a','#4a6b4f','#5a5a8a','#5f6b8a'];
    let hash = 0;
    for (let i=0;i<title.length;i++) hash = title.charCodeAt(i) + ((hash<<5)-hash);
    const color = colors[Math.abs(hash) % colors.length];
    const initial = (title.trim()[0] || '?').toUpperCase();
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420">
      <rect width="100%" height="100%" fill="${color}"/>
      <text x="50%" y="54%" font-family="Georgia, serif" font-size="130" fill="rgba(255,255,255,0.85)" text-anchor="middle" dominant-baseline="middle">${initial}</text>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  }
  function debounce(fn, ms){ let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function mostCommon(arr){
    const counts = {}; let best = arr[0], bestCount = 0;
    arr.forEach(v => { counts[v] = (counts[v]||0) + 1; if (counts[v] > bestCount) { bestCount = counts[v]; best = v; } });
    return best;
  }

  const THEMES = {
    night: { bg: '#0b0b0d', text: '#e9e6dd', link: '#d9a441' },
    sepia: { bg: '#efe3c8', text: '#3a2f22', link: '#8a6a2f' },
    light: { bg: '#ffffff', text: '#111111', link: '#3366cc' }
  };
  function applyRootTheme(name){
    const t = THEMES[name];
    document.documentElement.style.setProperty('--bg', t.bg);
    document.documentElement.style.setProperty('--text', t.text);
    el('pdfContainer').classList.remove('night','sepia','light');
    el('pdfContainer').classList.add(name);
  }

  /* ---------- State ---------- */
  let currentMeta = null;
  let pdfDoc = null;
  let pdfMode = 'raster'; // 'text' | 'raster'
  let pdfParagraphsCurrent = null;
  let epubBook = null, epubRendition = null;
  let pdfCurrentPage = 1;
  let pdfObserver = null;

  const MAX_READING_WIDTH = 780;
  const TEXT_FONT_BASE_PX = 19;
  const RENDER_DPR = Math.min(window.devicePixelRatio || 1, 2);

  const libraryScreen = el('library');
  const readerScreen = el('reader');
  const pdfContainer = el('pdfContainer');
  const pdfPages = el('pdfPages');
  const pdfTextWrap = el('pdfTextWrap');
  const pdfTextContainer = el('pdfTextContainer');
  const viewer = el('viewer');
  const bookTitleEl = el('bookTitle');
  const pageLabel = el('pageLabel');
  const progressFill = el('progressFill');
  const progressTrack = el('progressTrack');
  const loadingMsg = el('loadingMsg');

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  function resetLoadingMsg(){
    loadingMsg.innerHTML = 'Abriendo libro…';
    loadingMsg.style.flexDirection = '';
    loadingMsg.style.padding = '';
    loadingMsg.style.textAlign = '';
  }
  function showFatalError(err, context){
    console.error('[reader]', context, err);
    loadingMsg.innerHTML = '';
    loadingMsg.style.display = 'flex';
    loadingMsg.style.flexDirection = 'column';
    loadingMsg.style.gap = '12px';
    loadingMsg.style.padding = '0 30px';
    loadingMsg.style.textAlign = 'center';
    const msg = document.createElement('div');
    msg.textContent = 'Ocurrió un error abriendo el archivo: ' + (err && err.message ? err.message : String(err));
    const btn = document.createElement('button');
    btn.textContent = 'Volver a la biblioteca';
    btn.style.cssText = 'background:var(--bg-elevated); border:1px solid var(--hairline); color:var(--text); border-radius:9999px; padding:8px 18px; font-size:13px; cursor:pointer;';
    btn.addEventListener('click', () => { resetLoadingMsg(); showLibrary(); });
    loadingMsg.appendChild(msg);
    loadingMsg.appendChild(btn);
  }

  function viewerWrapSize(){
    const wrap = el('viewerWrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    return { w: w && w > 0 ? w : window.innerWidth, h: h && h > 0 ? h : window.innerHeight };
  }
  function readingColWidth(){
    return Math.min(viewerWrapSize().w * 0.94, MAX_READING_WIDTH);
  }
  function showReaderArea(which){
    viewer.style.display = which === 'epub' ? 'block' : 'none';
    pdfContainer.style.display = which === 'raster' ? (prefs.scrollMode ? 'block' : 'flex') : 'none';
    pdfTextWrap.style.display = which === 'text' ? 'block' : 'none';
  }

  /* ---------- Library view ---------- */
  async function renderLibrary(){
    const items = (await getAllMeta()).sort((a,b) => (b.lastOpened||0) - (a.lastOpened||0));
    const grid = el('grid');
    grid.innerHTML = '';
    el('emptyState').style.display = items.length ? 'none' : 'block';
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      const pct = (item.progress && item.progress.pct) || 0;
      card.innerHTML = `
        <div class="cover-wrap">
          <img src="${item.cover}" alt="">
          <div class="mini-progress"><div class="mini-progress-fill" style="width:${pct}%"></div></div>
          <div class="del-btn" data-id="${item.id}">×</div>
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-pct">${pct > 0 ? pct + '% leído' : (item.type === 'pdf' ? 'PDF' : 'EPUB')}</div>
      `;
      card.querySelector('.cover-wrap').addEventListener('click', e => {
        if (e.target.classList.contains('del-btn')) return;
        openBook(item);
      });
      card.querySelector('.del-btn').addEventListener('click', async e => {
        e.stopPropagation();
        if (confirm(`¿Eliminar "${item.title}" de tu biblioteca?`)) { await removeBook(item.id); renderLibrary(); }
      });
      grid.appendChild(card);
    });
  }

  function showLibrary(){
    readerScreen.classList.remove('active');
    libraryScreen.classList.add('active');
    teardownReader();
    renderLibrary();
  }
  function teardownReader(){
    if (pdfObserver) { pdfObserver.disconnect(); pdfObserver = null; }
    if (epubRendition) { try { epubRendition.destroy(); } catch(e){} epubRendition = null; }
    epubBook = null; pdfDoc = null; pdfParagraphsCurrent = null;
    pdfPages.innerHTML = '';
    pdfTextContainer.innerHTML = '';
    viewer.innerHTML = '';
    pdfTextWrap.onscroll = null;
    pdfTextContainer.onscroll = null;
    pdfContainer.onscroll = null;
    showReaderArea('none');
  }

  /* ---------- Adding a book ---------- */
  el('addBtn').addEventListener('click', () => el('fileInput').click());
  el('fileInput').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    await addAndOpenFile(file);
    el('fileInput').value = '';
  });

  async function addAndOpenFile(file){
    const isPdf = /\.pdf$/i.test(file.name);
    const isEpub = /\.epub$/i.test(file.name);
    if (!isPdf && !isEpub) { alert('Elegí un archivo .epub o .pdf'); return; }

    resetLoadingMsg();
    loadingMsg.style.display = 'flex';
    libraryScreen.classList.remove('active');
    readerScreen.classList.add('active');

    try {
      const buf = await file.arrayBuffer();
      const id = uid();
      let title = file.name.replace(/\.(pdf|epub)$/i, '');
      let cover = placeholderCover(title);

      if (isPdf) {
        try {
          const doc = await pdfjsLib.getDocument({ data: new Uint8Array(buf.slice(0)) }).promise;
          const info = await doc.getMetadata().catch(() => null);
          if (info && info.info && info.info.Title) title = info.info.Title;
          const page = await doc.getPage(1);
          const vp = page.getViewport({ scale: 0.35 });
          const canvas = document.createElement('canvas');
          canvas.width = vp.width; canvas.height = vp.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
          cover = canvas.toDataURL('image/jpeg', 0.75);
          await doc.destroy();
        } catch(e) { console.warn('[reader] no se pudo generar portada/metadata PDF, uso placeholder', e); }
      } else {
        try {
          const b = ePub(buf.slice(0));
          await b.ready;
          const meta = await b.loaded.metadata;
          if (meta && meta.title) title = meta.title;
          const coverUrl = await b.coverUrl().catch(() => null);
          if (coverUrl) {
            const res = await fetch(coverUrl);
            const blob = await res.blob();
            cover = await blobToDataUrl(blob);
          }
          b.destroy();
        } catch(e) { console.warn('[reader] no se pudo generar portada/metadata EPUB, uso placeholder', e); }
      }

      const meta = { id, title, type: isPdf ? 'pdf' : 'epub', cover, progress: { pct: 0 }, lastOpened: Date.now() };
      await saveFile(id, arrayBufferToBlob(buf, isPdf ? 'application/pdf' : 'application/epub+zip'));
      await saveMeta(meta);
      await openBook(meta);
    } catch(err) {
      showFatalError(err, 'addAndOpenFile');
    }
  }

  /* ---------- PDF text extraction (reflow mode) ---------- */
  const FOOTER_JUNK_PATTERNS = [
    /^https?:\/\/\S+$/i,
    /^Last updated /i,
    /^eBooks@/i,
    /university of adelaide/i,
    /^south australia \d+$/i
  ];

  async function extractPdfParagraphs(doc){
    const paragraphs = [];
    for (let p = 1; p <= doc.numPages; p++) {
      let content;
      try {
        const page = await doc.getPage(p);
        content = await page.getTextContent();
      } catch(e) { continue; }
      const items = content.items;
      if (!items.length) continue;

      const lines = [];
      let curLine = null;
      const Y_TOL = 2;
      items.forEach(item => {
        if (!item.str || !item.str.trim()) { if (curLine) curLine.items.push(item); return; }
        const y = item.transform[5];
        if (curLine && Math.abs(curLine.y - y) <= Y_TOL) curLine.items.push(item);
        else { curLine = { y, items: [item] }; lines.push(curLine); }
      });
      lines.sort((a,b) => b.y - a.y);

      let lineData = lines.map(line => {
        const sorted = line.items.slice().sort((a,b) => a.transform[4]-b.transform[4]);
        const text = sorted.map(it => it.str).join('').replace(/\s+/g,' ').trim();
        const x0 = sorted[0] ? sorted[0].transform[4] : 0;
        const height = sorted.reduce((m, it) => Math.max(m, it.height || Math.abs(it.transform[3]) || 0), 0);
        return { text, x0, height, itemCount: sorted.length };
      }).filter(l => l.text.length > 0);
      if (!lineData.length) continue;

      // Remove footer/URL boilerplate that sometimes leaks into the text layer.
      lineData = lineData.filter(l => !FOOTER_JUNK_PATTERNS.some(re => re.test(l.text)));
      if (!lineData.length) continue;

      // Detect decorative drop-cap letters (single oversized character starting a chapter)
      // and merge them into the following line instead of leaving them out of order.
      const bodyHeights = lineData.filter(l => l.text.length > 3).map(l => Math.round(l.height));
      const typicalHeight = bodyHeights.length ? mostCommon(bodyHeights) : 0;
      let pendingDropCap = '';
      lineData = lineData.reduce((acc, l) => {
        const isDropCap = l.itemCount === 1 && l.text.length === 1 && typicalHeight > 0 && l.height > typicalHeight * 1.6;
        if (isDropCap) { pendingDropCap += l.text; return acc; }
        if (pendingDropCap) {
          l = Object.assign({}, l, { text: pendingDropCap + l.text.replace(/^\s+/, '') });
          pendingDropCap = '';
        }
        acc.push(l);
        return acc;
      }, []);

      const bodyLeft = mostCommon(lineData.map(l => Math.round(l.x0)));
      const INDENT_THRESH = 8;

      lineData.forEach(line => {
        const isNewPara = paragraphs.length === 0 || (line.x0 > bodyLeft + INDENT_THRESH);
        if (isNewPara) {
          paragraphs.push({ text: line.text, page: p });
        } else {
          const last = paragraphs[paragraphs.length - 1];
          if (/-$/.test(last.text) && /^[a-z]/.test(line.text)) last.text = last.text.replace(/-$/, '') + line.text;
          else last.text += ' ' + line.text;
        }
      });
    }
    return paragraphs;
  }
  function buildParagraphsHtml(paragraphs){
    return paragraphs.map(p => `<p>${escapeHtml(p.text)}</p>`).join('');
  }

  /* ---------- Opening / rendering a book ---------- */
  async function openBook(meta){
    resetLoadingMsg();
    currentMeta = meta;
    libraryScreen.classList.remove('active');
    readerScreen.classList.add('active');
    loadingMsg.style.display = 'flex';
    bookTitleEl.textContent = meta.title;
    pageLabel.textContent = '';
    progressFill.style.width = (meta.progress && meta.progress.pct || 0) + '%';

    applyRootTheme(prefs.theme);
    updateScrollSwitchUI();

    try {
      const blob = await getFile(meta.id);
      if (!blob) throw new Error('No se encontró el archivo guardado. Agregalo de nuevo.');
      const buf = await blob.arrayBuffer();

      meta.lastOpened = Date.now();
      saveMeta(meta);

      if (meta.type === 'pdf') {
        pdfDoc = await pdfjsLib.getDocument({ data: new Uint8Array(buf) }).promise;

        let paragraphs = await getTextCache(meta.id);
        if (!paragraphs) {
          paragraphs = await extractPdfParagraphs(pdfDoc);
          saveTextCache(meta.id, paragraphs);
        }
        const totalChars = paragraphs.reduce((s,p) => s + p.text.length, 0);
        const avgCharsPerPage = totalChars / pdfDoc.numPages;
        pdfMode = avgCharsPerPage > 40 ? 'text' : 'raster';
        pdfParagraphsCurrent = pdfMode === 'text' ? paragraphs : null;

        el('tapPrev').classList.toggle('hidden', prefs.scrollMode);
        el('tapNext').classList.toggle('hidden', prefs.scrollMode);
        updateSizeUI();

        if (pdfMode === 'text') {
          showReaderArea('text');
          renderPdfText(paragraphs, meta.progress);
        } else {
          showReaderArea('raster');
          pdfContainer.classList.toggle('scrollmode', prefs.scrollMode);
          if (prefs.scrollMode) await renderPdfRasterContinuous(meta.progress && meta.progress.page);
          else await showPdfRasterPage((meta.progress && meta.progress.page) || 1);
        }
      } else {
        showReaderArea('epub');
        el('tapPrev').classList.toggle('hidden', prefs.scrollMode);
        el('tapNext').classList.toggle('hidden', prefs.scrollMode);
        updateSizeUI();

        epubBook = ePub(buf);
        epubRendition = epubBook.renderTo('viewer', {
          width: '100%', height: '100%',
          flow: prefs.scrollMode ? 'scrolled-doc' : 'paginated',
          spread: 'none'
        });
        registerEpubThemes();
        epubRendition.themes.select(prefs.theme);
        epubRendition.themes.fontSize((prefs.size || 100) + '%');
        epubRendition.on('relocated', location => {
          if (!epubBook.locations || !epubBook.locations.length()) return;
          const pct = Math.round(epubBook.locations.percentageFromCfi(location.start.cfi) * 100);
          progressFill.style.width = pct + '%';
          const total = epubBook.locations.length();
          const current = epubBook.locations.locationFromCfi(location.start.cfi);
          pageLabel.textContent = `${current} de ${total} · ${pct}%`;
          persistProgress({ pct, cfi: location.start.cfi });
        });
        const savedCfi = meta.progress && meta.progress.cfi;
        await epubRendition.display(savedCfi || undefined);
        epubBook.ready.then(() => epubBook.locations.generate(1600)).catch(()=>{});
      }

      loadingMsg.style.display = 'none';
    } catch(err) {
      showFatalError(err, 'openBook');
    }
  }

  const persistProgress = debounce((patch) => {
    if (!currentMeta) return;
    currentMeta.progress = Object.assign({}, currentMeta.progress, patch);
    saveMeta(currentMeta);
    renderLibrary();
  }, 500);

  /* ---------- PDF text-reflow rendering ---------- */
  let pdfTextPages = [];    // [{start, end}] paragraph index ranges, one per page
  let pdfTextPageIndex = 0;

  function paginateParagraphs(paragraphs, colWidth, availHeight, fontPx){
    const pageHeight = availHeight - 68 - 22; // padding + safety buffer so a borderline line never gets clipped
    const measurer = document.createElement('div');
    measurer.style.cssText = `position:fixed; left:-9999px; top:0; visibility:hidden; width:${colWidth}px; font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif; font-size:${fontPx}px; line-height:1.65;`;
    document.body.appendChild(measurer);

    const pages = [];
    let pageStart = 0;
    let pageTopOffset = 0;

    paragraphs.forEach((p, idx) => {
      const pEl = document.createElement('p');
      pEl.textContent = p.text;
      pEl.style.margin = '0 0 0.9em 0';
      pEl.style.textIndent = idx === pageStart ? '0' : '1.3em';
      measurer.appendChild(pEl);
      const bottom = (pEl.offsetTop + pEl.offsetHeight) - pageTopOffset;
      if (bottom > pageHeight && idx > pageStart) {
        pages.push({ start: pageStart, end: idx });
        pageStart = idx;
        pageTopOffset = pEl.offsetTop;
      }
    });
    pages.push({ start: pageStart, end: paragraphs.length });

    document.body.removeChild(measurer);
    return pages.length ? pages : [{ start: 0, end: paragraphs.length }];
  }

  function renderPdfText(paragraphs, resume){
    pdfTextWrap.style.display = 'block';
    const colWidth = readingColWidth();
    const fontPx = Math.round(TEXT_FONT_BASE_PX * ((prefs.size || 100) / 100));
    pdfTextContainer.style.width = colWidth + 'px';
    pdfTextContainer.style.maxWidth = colWidth + 'px';
    pdfTextContainer.style.fontSize = fontPx + 'px';

    if (prefs.scrollMode) {
      pdfTextWrap.style.overflowY = 'auto';
      pdfTextWrap.style.overflowX = 'hidden';
      pdfTextContainer.style.height = 'auto';
      pdfTextContainer.style.overflow = 'visible';
      pdfTextContainer.style.padding = '34px 4px 60px 4px';
      pdfTextContainer.innerHTML = buildParagraphsHtml(paragraphs);

      pdfTextWrap.onscroll = debounce(() => {
        const max = pdfTextWrap.scrollHeight - pdfTextWrap.clientHeight;
        const frac = max > 0 ? pdfTextWrap.scrollTop / max : 0;
        const pct = Math.round(frac * 100);
        progressFill.style.width = pct + '%';
        pageLabel.textContent = pct + '%';
        persistProgress({ pct, scrollFrac: frac, mode: 'text' });
      }, 200);

      requestAnimationFrame(() => {
        if (resume && typeof resume.scrollFrac === 'number') {
          const max = pdfTextWrap.scrollHeight - pdfTextWrap.clientHeight;
          pdfTextWrap.scrollTop = resume.scrollFrac * Math.max(max, 0);
        }
      });
    } else {
      pdfTextWrap.style.overflowY = 'hidden';
      pdfTextWrap.style.overflowX = 'hidden';
      pdfTextWrap.onscroll = null;

      const availHeight = viewerWrapSize().h;
      pdfTextContainer.style.height = availHeight + 'px';
      pdfTextContainer.style.overflow = 'hidden';
      pdfTextContainer.style.padding = '34px 2px';

      pdfTextPages = paginateParagraphs(paragraphs, colWidth, availHeight, fontPx);
      let startIndex = 0;
      if (resume && typeof resume.scrollFrac === 'number') {
        startIndex = Math.min(pdfTextPages.length - 1, Math.max(0, Math.round(resume.scrollFrac * pdfTextPages.length)));
      }
      showPdfTextPage(startIndex);
    }
  }

  function showPdfTextPage(index){
    if (!pdfTextPages.length || !pdfParagraphsCurrent) return;
    pdfTextPageIndex = Math.max(0, Math.min(index, pdfTextPages.length - 1));
    const range = pdfTextPages[pdfTextPageIndex];
    pdfTextContainer.innerHTML = buildParagraphsHtml(pdfParagraphsCurrent.slice(range.start, range.end));

    const totalPages = pdfTextPages.length;
    const currentPage = pdfTextPageIndex + 1;
    const pct = Math.round((currentPage / totalPages) * 100);
    progressFill.style.width = pct + '%';
    pageLabel.textContent = `${currentPage} de ${totalPages} · ${pct}%`;
    persistProgress({ pct, scrollFrac: pdfTextPageIndex / totalPages, mode: 'text' });
  }
  function pdfTextNext(){ showPdfTextPage(pdfTextPageIndex + 1); }
  function pdfTextPrev(){ showPdfTextPage(pdfTextPageIndex - 1); }

  /* ---------- PDF raster fallback (scanned PDFs) ---------- */
  async function renderPageCrisp(page, displayScale){
    const renderViewport = page.getViewport({ scale: displayScale * RENDER_DPR });
    const displayViewport = page.getViewport({ scale: displayScale });
    const canvas = document.createElement('canvas');
    canvas.width = renderViewport.width;
    canvas.height = renderViewport.height;
    canvas.style.width = displayViewport.width + 'px';
    canvas.style.height = displayViewport.height + 'px';
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: renderViewport }).promise;
    return { canvas, displayViewport };
  }
  function pdfRasterScale(naturalWidth, naturalHeight, mode){
    const { w: availWidth, h: availHeight } = viewerWrapSize();
    const zoomMult = (prefs.size || 100) / 100;
    if (mode === 'paginated') return Math.min(availWidth / naturalWidth, availHeight / naturalHeight) * 0.97 * zoomMult;
    return (readingColWidth() / naturalWidth) * zoomMult;
  }
  async function showPdfRasterPage(pageNum){
    pageNum = Math.max(1, Math.min(pageNum, pdfDoc.numPages));
    pdfCurrentPage = pageNum;
    pdfPages.innerHTML = '';
    const page = await pdfDoc.getPage(pageNum);
    const natural = page.getViewport({ scale: 1 });
    const displayScale = pdfRasterScale(natural.width, natural.height, 'paginated');
    const { canvas, displayViewport } = await renderPageCrisp(page, displayScale);
    const wrapper = document.createElement('div');
    wrapper.className = 'pdf-page-wrapper';
    wrapper.style.width = displayViewport.width + 'px';
    wrapper.style.height = displayViewport.height + 'px';
    wrapper.appendChild(canvas);
    pdfPages.appendChild(wrapper);

    const pct = Math.round((pageNum / pdfDoc.numPages) * 100);
    progressFill.style.width = pct + '%';
    pageLabel.textContent = `${pageNum} de ${pdfDoc.numPages} · ${pct}%`;
    persistProgress({ pct, page: pageNum, mode: 'raster' });
  }
  async function renderPdfRasterContinuous(resumePage){
    pdfPages.innerHTML = '';
    const wrappers = [];
    const firstPage = await pdfDoc.getPage(1);
    const natural = firstPage.getViewport({ scale: 1 });
    const displayScale = pdfRasterScale(natural.width, natural.height, 'scroll');

    for (let i = 1; i <= pdfDoc.numPages; i++) {
      const page = await pdfDoc.getPage(i);
      const displayViewport = page.getViewport({ scale: displayScale });
      const wrapper = document.createElement('div');
      wrapper.className = 'pdf-page-wrapper';
      wrapper.dataset.pageNum = i;
      wrapper.style.width = displayViewport.width + 'px';
      wrapper.style.height = displayViewport.height + 'px';
      pdfPages.appendChild(wrapper);
      wrappers.push(wrapper);
    }

    if (pdfObserver) pdfObserver.disconnect();
    pdfObserver = new IntersectionObserver(entries => {
      entries.forEach(async entry => {
        const wrapper = entry.target;
        if (entry.isIntersecting && !wrapper.dataset.rendered) {
          wrapper.dataset.rendered = '1';
          const pageNum = parseInt(wrapper.dataset.pageNum, 10);
          try {
            const page = await pdfDoc.getPage(pageNum);
            const { canvas } = await renderPageCrisp(page, displayScale);
            wrapper.appendChild(canvas);
          } catch(e) { console.warn('[reader] fallo al renderizar página', pageNum, e); }
        }
      });
    }, { root: pdfContainer, rootMargin: '1000px 0px', threshold: 0.01 });
    wrappers.forEach(w => pdfObserver.observe(w));

    pdfContainer.onscroll = debounce(() => {
      const containerTop = pdfContainer.scrollTop + 80;
      let current = 1;
      for (const w of wrappers) { if (w.offsetTop <= containerTop) current = parseInt(w.dataset.pageNum, 10); else break; }
      const pct = Math.round((current / pdfDoc.numPages) * 100);
      progressFill.style.width = pct + '%';
      pageLabel.textContent = `${current} de ${pdfDoc.numPages} · ${pct}%`;
      pdfCurrentPage = current;
      persistProgress({ pct, page: current, mode: 'raster' });
    }, 200);

    if (resumePage && resumePage > 1) {
      requestAnimationFrame(() => {
        const target = wrappers[Math.min(resumePage - 1, wrappers.length - 1)];
        if (target) pdfContainer.scrollTop = target.offsetTop;
      });
    }
  }

  /* ---------- EPUB themes ---------- */
  function registerEpubThemes(){
    Object.keys(THEMES).forEach(name => {
      const t = THEMES[name];
      epubRendition.themes.register(name, {
        'body': {
          'background': t.bg + ' !important',
          'color': t.text + ' !important',
          'font-family': "Georgia, 'Iowan Old Style', 'Palatino Linotype', serif !important",
          'line-height': '1.65 !important'
        },
        'p, div, span, li': { 'color': t.text + ' !important' },
        'a': { 'color': t.link + ' !important' }
      });
    });
  }

  /* ---------- Navigation ---------- */
  el('tapPrev').addEventListener('click', () => {
    if (currentMeta && currentMeta.type === 'pdf') {
      if (prefs.scrollMode) return;
      if (pdfMode === 'text') pdfTextPrev(); else showPdfRasterPage(pdfCurrentPage - 1);
    } else if (epubRendition) epubRendition.prev();
  });
  el('tapNext').addEventListener('click', () => {
    if (currentMeta && currentMeta.type === 'pdf') {
      if (prefs.scrollMode) return;
      if (pdfMode === 'text') pdfTextNext(); else showPdfRasterPage(pdfCurrentPage + 1);
    } else if (epubRendition) epubRendition.next();
  });
  document.addEventListener('keydown', e => {
    if (!readerScreen.classList.contains('active')) return;
    if (e.key === 'ArrowLeft') el('tapPrev').click();
    if (e.key === 'ArrowRight') el('tapNext').click();
  });

  progressTrack.addEventListener('click', e => {
    const rect = progressTrack.getBoundingClientRect();
    const ratio = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
    if (!currentMeta) return;

    if (currentMeta.type === 'pdf' && pdfMode === 'text') {
      if (prefs.scrollMode) {
        const max = pdfTextWrap.scrollHeight - pdfTextWrap.clientHeight;
        pdfTextWrap.scrollTop = ratio * Math.max(max, 0);
      } else {
        const targetIndex = Math.max(0, Math.min(pdfTextPages.length - 1, Math.round(ratio * pdfTextPages.length)));
        showPdfTextPage(targetIndex);
      }
    } else if (currentMeta.type === 'pdf') {
      const targetPage = Math.max(1, Math.round(ratio * pdfDoc.numPages));
      if (prefs.scrollMode) {
        const wrapper = pdfPages.querySelector(`[data-page-num="${targetPage}"]`);
        if (wrapper) pdfContainer.scrollTop = wrapper.offsetTop;
      } else {
        showPdfRasterPage(targetPage);
      }
    } else if (epubRendition && epubBook.locations && epubBook.locations.length()) {
      const cfi = epubBook.locations.cfiFromPercentage(ratio);
      epubRendition.display(cfi);
    }
  });

  el('btnLibrary').addEventListener('click', showLibrary);

  /* ---------- Settings panel ---------- */
  el('btnSettings').addEventListener('click', () => el('settingsPanel').classList.add('active'));
  el('closeSettings').addEventListener('click', () => el('settingsPanel').classList.remove('active'));
  el('settingsPanel').addEventListener('click', e => { if (e.target.id === 'settingsPanel') el('settingsPanel').classList.remove('active'); });

  document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      prefs.theme = s.dataset.theme;
      savePrefs();
      applyRootTheme(prefs.theme);
      document.querySelectorAll('.swatch').forEach(x => x.classList.toggle('active', x === s));
      if (epubRendition) epubRendition.themes.select(prefs.theme);
    });
  });

  function updateSizeUI(){
    el('sizeValueLabel').textContent = (prefs.size || 100) + '%';
    const isRasterPdf = currentMeta && currentMeta.type === 'pdf' && pdfMode === 'raster';
    el('sizeLabel').textContent = isRasterPdf ? 'Zoom' : 'Tamaño de letra';
  }
  function currentTextResume(){
    if (prefs.scrollMode) {
      const max = pdfTextWrap.scrollHeight - pdfTextWrap.clientHeight;
      return { scrollFrac: max > 0 ? pdfTextWrap.scrollTop / max : 0 };
    }
    const total = pdfTextPages.length || 1;
    return { scrollFrac: pdfTextPageIndex / total };
  }
  function applySize(){
    prefs.size = Math.max(70, Math.min(180, prefs.size));
    savePrefs();
    updateSizeUI();
    if (currentMeta && currentMeta.type === 'pdf' && pdfDoc) {
      if (pdfMode === 'text') {
        renderPdfText(pdfParagraphsCurrent, currentTextResume());
      } else if (prefs.scrollMode) {
        renderPdfRasterContinuous(pdfCurrentPage);
      } else {
        showPdfRasterPage(pdfCurrentPage);
      }
    } else if (epubRendition) {
      epubRendition.themes.fontSize(prefs.size + '%');
    }
  }
  el('sizeUp').addEventListener('click', () => { prefs.size = (prefs.size || 100) + 10; applySize(); });
  el('sizeDown').addEventListener('click', () => { prefs.size = (prefs.size || 100) - 10; applySize(); });

  function updateScrollSwitchUI(){ el('scrollSwitch').classList.toggle('on', !!prefs.scrollMode); }
  el('scrollSwitch').addEventListener('click', async () => {
    prefs.scrollMode = !prefs.scrollMode;
    savePrefs();
    updateScrollSwitchUI();
    if (!currentMeta) return;
    loadingMsg.style.display = 'flex';
    try {
      if (currentMeta.type === 'pdf') {
        el('tapPrev').classList.toggle('hidden', prefs.scrollMode);
        el('tapNext').classList.toggle('hidden', prefs.scrollMode);
        if (pdfMode === 'text') {
          renderPdfText(pdfParagraphsCurrent, currentTextResume());
        } else {
          pdfContainer.classList.toggle('scrollmode', prefs.scrollMode);
          showReaderArea('raster');
          if (prefs.scrollMode) await renderPdfRasterContinuous(pdfCurrentPage);
          else await showPdfRasterPage(pdfCurrentPage);
        }
      } else {
        const savedCfi = currentMeta.progress && currentMeta.progress.cfi;
        if (epubRendition) epubRendition.destroy();
        epubRendition = epubBook.renderTo('viewer', {
          width: '100%', height: '100%',
          flow: prefs.scrollMode ? 'scrolled-doc' : 'paginated',
          spread: 'none'
        });
        registerEpubThemes();
        epubRendition.themes.select(prefs.theme);
        epubRendition.themes.fontSize((prefs.size || 100) + '%');
        epubRendition.on('relocated', location => {
          if (!epubBook.locations || !epubBook.locations.length()) return;
          const pct = Math.round(epubBook.locations.percentageFromCfi(location.start.cfi) * 100);
          progressFill.style.width = pct + '%';
          const total = epubBook.locations.length();
          const current = epubBook.locations.locationFromCfi(location.start.cfi);
          pageLabel.textContent = `${current} de ${total} · ${pct}%`;
          persistProgress({ pct, cfi: location.start.cfi });
        });
        el('tapPrev').classList.toggle('hidden', prefs.scrollMode);
        el('tapNext').classList.toggle('hidden', prefs.scrollMode);
        await epubRendition.display(savedCfi || undefined);
      }
      loadingMsg.style.display = 'none';
    } catch(err) {
      showFatalError(err, 'toggle scrollMode');
    }
  });

  el('deleteCurrentBtn').addEventListener('click', async () => {
    if (!currentMeta) return;
    if (confirm(`¿Eliminar "${currentMeta.title}" de tu biblioteca?`)) {
      await removeBook(currentMeta.id);
      el('settingsPanel').classList.remove('active');
      showLibrary();
    }
  });

  /* ---------- Boot ---------- */
  window.addEventListener('error', e => { console.error('[reader] error global', e.error || e.message); });
  window.addEventListener('unhandledrejection', e => { console.error('[reader] promesa no manejada', e.reason); });

  async function boot(){
    loadPrefs();
    await initStorage();
    renderLibrary();
  }
  boot();

})();
</script>
</body>
</html>
