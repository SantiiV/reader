<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libros • Apple Books</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Georgia&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --reader-bg: #111111;
            --text: #f5f5f5;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Georgia', serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: #1a1a1a;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }
        .logo { font-size: 26px; font-weight: 700; letter-spacing: -1px; }
        
        .nav a {
            color: #bbb;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 9999px;
            transition: 0.2s;
        }
        .nav a.active {
            background: #333;
            color: white;
        }
        
        .main { flex: 1; display: flex; overflow: hidden; }
        
        /* Biblioteca */
        #library-view {
            flex: 1;
            padding: 40px 32px;
            overflow-y: auto;
        }
        #library {
            max-width: 800px;
            margin: 0 auto;
        }
        .book-item {
            padding: 18px 24px;
            background: #1f1f1f;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .book-item:hover {
            background: #2a2a2a;
        }
        .progress-bar {
            height: 4px;
            background: #ffcc00;
            margin-top: 8px;
            border-radius: 9999px;
        }
        
        /* Lector */
        #reader-view {
            flex: 1;
            display: none;
            flex-direction: column;
            background: var(--reader-bg);
        }
        .reader-header {
            padding: 16px 32px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        #pdf-container {
            flex: 1;
            overflow: auto;
            padding: 60px 40px;
            text-align: center;
            background: #0a0a0a;
        }
        #pdf-pages {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 850px;
            margin: 0 auto;
        }
        .pdf-page {
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            background: white;
            max-width: 100%;
        }
        
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 66px;
            height: 66px;
            background: #222;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Libros</div>
        <div class="nav">
            <a href="#" onclick="switchView('library')" class="active" id="lib-tab">Biblioteca</a>
            <a href="#" onclick="switchView('reader')" id="read-tab">Leyendo</a>
        </div>
    </header>
    
    <div class="main">
        <!-- Biblioteca -->
        <div id="library-view">
            <div style="text-align:center; margin-bottom:30px;">
                <input type="file" id="pdf-upload" accept="application/pdf" style="display:none;">
                <button onclick="document.getElementById('pdf-upload').click()" 
                        style="padding:14px 32px; background:#333; border:none; border-radius:9999px; color:white; font-size:15px; cursor:pointer;">
                    + Agregar PDF desde mi PC
                </button>
            </div>
            <div id="library"></div>
        </div>
        
        <!-- Lector PDF -->
        <div id="reader-view">
            <div class="reader-header">
                <button onclick="exitReader()" style="font-size:26px; background:none; border:none; color:#ddd;">←</button>
                <div id="current-book-title" style="font-weight:600; font-size:17px;"></div>
                <button onclick="toggleMenu()" style="font-size:24px;">Aa</button>
            </div>
            
            <div id="pdf-container">
                <div id="pdf-pages"></div>
            </div>
        </div>
    </div>
    
    <div class="fab" onclick="document.getElementById('pdf-upload').click()">+</div>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let library = JSON.parse(localStorage.getItem('pdfLibrary')) || [];
        
        function renderLibrary() {
            const container = document.getElementById('library');
            container.innerHTML = '';
            
            if (library.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding:60px;">Aún no tienes libros.<br>Agrega un PDF usando el botón de arriba.</p>';
                return;
            }
            
            library.forEach((book, index) => {
                const progress = book.progress || 0;
                
                const div = document.createElement('div');
                div.className = 'book-item';
                div.innerHTML = `
                    <div>
                        <div style="font-size:17px; font-weight:500;">${book.name}</div>
                        <div style="color:#888; font-size:14px; margin-top:4px;">${progress}% completado</div>
                        <div class="progress-bar" style="width:${progress}%"></div>
                    </div>
                    <span style="color:#666; font-size:24px;">→</span>
                `;
                div.onclick = () => openPDF(book, index);
                container.appendChild(div);
            });
        }
        
        async function openPDF(book, index) {
            document.getElementById('current-book-title').textContent = book.name;
            switchView('reader');
            
            const pagesContainer = document.getElementById('pdf-pages');
            pagesContainer.innerHTML = '<p style="color:#666; padding:80px;">Cargando PDF...</p>';
            
            try {
                const loadingTask = pdfjsLib.getDocument(book.data);
                const pdf = await loadingTask.promise;
                
                pagesContainer.innerHTML = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const scale = 1.75;
                    const viewport = page.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-page';
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    const context = canvas.getContext('2d');
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                    
                    pagesContainer.appendChild(canvas);
                }
                
                // Guardar progreso (última página vista)
                book.progress = 85; // Puedes mejorar esto midiendo scroll
                library[index] = book;
                localStorage.setItem('pdfLibrary', JSON.stringify(library));
                renderLibrary();
                
            } catch (e) {
                pagesContainer.innerHTML = `<p style="color:#ff6666;">Error al abrir el PDF</p>`;
            }
        }
        
        function switchView(view) {
            document.getElementById('library-view').style.display = view === 'library' ? 'block' : 'none';
            document.getElementById('reader-view').style.display = view === 'reader' ? 'flex' : 'none';
            
            document.getElementById('lib-tab').classList.toggle('active', view === 'library');
            document.getElementById('read-tab').classList.toggle('active', view === 'reader');
        }
        
        function exitReader() {
            switchView('library');
        }
        
        function toggleMenu() {
            alert("🎨 Modo Apple Books activado\n\n• Fondo muy oscuro\n• Puedes usar Ctrl + rueda para zoom");
        }
        
        // Subir PDF
        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(ev) {
                const newBook = {
                    name: file.name.replace('.pdf', ''),
                    data: ev.target.result,
                    progress: 0
                };
                
                library.unshift(newBook);
                localStorage.setItem('pdfLibrary', JSON.stringify(library));
                renderLibrary();
                
                openPDF(newBook, 0);
            };
            reader.readAsDataURL(file);
        });
        
        // Inicializar
        window.onload = () => {
            renderLibrary();
            switchView('library');
        };
    </script>
</body>
</html>
